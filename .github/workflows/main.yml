name: Build Kernels

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Release Type"
        type: choice
        options: [ Actions, Pre-Release, Release ]
        default: Actions
      kernel_build_version:
        description: "Kernel Version to Build"
        type: choice
        options:
          - all
          - a12-5-10
          - a13-5-10
          - a13-5-15
          - a14-5-15
          - a14-6-1
          - a15-6-6
          - a16-6-12
          - nezha-a16-6-12
          - lts
          - custom
          - testing
          - bypass
        default: custom
      feature_set:
        description: "Feature Set"
        type: choice
        options:
          - WKSU+SUSFS+BBG
          - WKSU+BBG
          - WKSU
          - BBG
          - None
        default: WKSU+SUSFS+BBG
      ksu_commit:
        description: "KSU Commit (optional)"
        type: string
        default: ""
        required: false
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  fetch-commits:
    runs-on: ubuntu-latest
    outputs:
      ksu_commit: ${{ steps.fetch.outputs.ksu_commit }}
      anykernel_commit: ${{ steps.fetch.outputs.anykernel_commit }}
      patches_commit: ${{ steps.fetch.outputs.patches_commit }}
      susfs_commit: ${{ steps.fetch.outputs.susfs_commit }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Fetch Commits
        id: fetch
        uses: ./.github/actions/fetch-commits
        with:
          ksu_commit: ${{ inputs.ksu_commit }}

  build-a12-5-10:
    if: ${{ inputs.kernel_build_version == 'all' || inputs.kernel_build_version == 'a12-5-10' || startsWith(github.ref, 'refs/tags/v') }}
    needs: fetch-commits
    uses: ./.github/workflows/prepare.yml
    with:
      config_file: .github/kernel-config/a12-5.10.json
      ksu_commit: ${{ inputs.ksu_commit || needs.fetch-commits.outputs.ksu_commit }}
      anykernel_commit: ${{ needs.fetch-commits.outputs.anykernel_commit }}
      patches_commit: ${{ needs.fetch-commits.outputs.patches_commit }}
      susfs_commit: ${{ needs.fetch-commits.outputs.susfs_commit }}
      feature_set: ${{ inputs.feature_set || 'WKSU+SUSFS+BBG' }}
    secrets: inherit

  build-a13-5-10:
    if: ${{ inputs.kernel_build_version == 'all' || inputs.kernel_build_version == 'a13-5-10' || startsWith(github.ref, 'refs/tags/v') }}
    needs: fetch-commits
    uses: ./.github/workflows/prepare.yml
    with:
      config_file: .github/kernel-config/a13-5.10.json
      ksu_commit: ${{ inputs.ksu_commit || needs.fetch-commits.outputs.ksu_commit }}
      anykernel_commit: ${{ needs.fetch-commits.outputs.anykernel_commit }}
      patches_commit: ${{ needs.fetch-commits.outputs.patches_commit }}
      susfs_commit: ${{ needs.fetch-commits.outputs.susfs_commit }}
      feature_set: ${{ inputs.feature_set || 'WKSU+SUSFS+BBG' }}
    secrets: inherit

  build-a13-5-15:
    if: ${{ inputs.kernel_build_version == 'all' || inputs.kernel_build_version == 'a13-5-15' || startsWith(github.ref, 'refs/tags/v') }}
    needs: fetch-commits
    uses: ./.github/workflows/prepare.yml
    with:
      config_file: .github/kernel-config/a13-5.15.json
      ksu_commit: ${{ inputs.ksu_commit || needs.fetch-commits.outputs.ksu_commit }}
      anykernel_commit: ${{ needs.fetch-commits.outputs.anykernel_commit }}
      patches_commit: ${{ needs.fetch-commits.outputs.patches_commit }}
      susfs_commit: ${{ needs.fetch-commits.outputs.susfs_commit }}
      feature_set: ${{ inputs.feature_set || 'WKSU+SUSFS+BBG' }}
    secrets: inherit

  build-a14-5-15:
    if: ${{ inputs.kernel_build_version == 'all' || inputs.kernel_build_version == 'a14-5-15' || startsWith(github.ref, 'refs/tags/v') }}
    needs: fetch-commits
    uses: ./.github/workflows/prepare.yml
    with:
      config_file: .github/kernel-config/a14-5.15.json
      ksu_commit: ${{ inputs.ksu_commit || needs.fetch-commits.outputs.ksu_commit }}
      anykernel_commit: ${{ needs.fetch-commits.outputs.anykernel_commit }}
      patches_commit: ${{ needs.fetch-commits.outputs.patches_commit }}
      susfs_commit: ${{ needs.fetch-commits.outputs.susfs_commit }}
      feature_set: ${{ inputs.feature_set || 'WKSU+SUSFS+BBG' }}
    secrets: inherit

  build-a14-6-1:
    if: ${{ inputs.kernel_build_version == 'all' || inputs.kernel_build_version == 'a14-6-1' || startsWith(github.ref, 'refs/tags/v') }}
    needs: fetch-commits
    uses: ./.github/workflows/prepare.yml
    with:
      config_file: .github/kernel-config/a14-6.1.json
      ksu_commit: ${{ inputs.ksu_commit || needs.fetch-commits.outputs.ksu_commit }}
      anykernel_commit: ${{ needs.fetch-commits.outputs.anykernel_commit }}
      patches_commit: ${{ needs.fetch-commits.outputs.patches_commit }}
      susfs_commit: ${{ needs.fetch-commits.outputs.susfs_commit }}
      feature_set: ${{ inputs.feature_set || 'WKSU+SUSFS+BBG' }}
    secrets: inherit

  build-a15-6-6:
    if: ${{ inputs.kernel_build_version == 'all' || inputs.kernel_build_version == 'a15-6-6' || startsWith(github.ref, 'refs/tags/v') }}
    needs: fetch-commits
    uses: ./.github/workflows/prepare.yml
    with:
      config_file: .github/kernel-config/a15-6.6.json
      ksu_commit: ${{ inputs.ksu_commit || needs.fetch-commits.outputs.ksu_commit }}
      anykernel_commit: ${{ needs.fetch-commits.outputs.anykernel_commit }}
      patches_commit: ${{ needs.fetch-commits.outputs.patches_commit }}
      susfs_commit: ${{ needs.fetch-commits.outputs.susfs_commit }}
      feature_set: ${{ inputs.feature_set || 'WKSU+SUSFS+BBG' }}
    secrets: inherit

  build-a16-6-12:
    if: ${{ inputs.kernel_build_version == 'all' || inputs.kernel_build_version == 'a16-6-12' || startsWith(github.ref, 'refs/tags/v') }}
    needs: fetch-commits
    uses: ./.github/workflows/prepare.yml
    with:
      config_file: .github/kernel-config/a16-6.12.json
      ksu_commit: ${{ inputs.ksu_commit || needs.fetch-commits.outputs.ksu_commit }}
      anykernel_commit: ${{ needs.fetch-commits.outputs.anykernel_commit }}
      patches_commit: ${{ needs.fetch-commits.outputs.patches_commit }}
      susfs_commit: ${{ needs.fetch-commits.outputs.susfs_commit }}
      feature_set: ${{ inputs.feature_set || 'WKSU+SUSFS+BBG' }}
    secrets: inherit

  build-nezha-a16-6-12:
    if: ${{ inputs.kernel_build_version == 'all' || inputs.kernel_build_version == 'nezha-a16-6-12' || startsWith(github.ref, 'refs/tags/v') }}
    needs: fetch-commits
    uses: ./.github/workflows/prepare.yml
    with:
      config_file: .github/kernel-config/nezha-a16-6.12.json
      ksu_commit: ${{ inputs.ksu_commit || needs.fetch-commits.outputs.ksu_commit }}
      anykernel_commit: ${{ needs.fetch-commits.outputs.anykernel_commit }}
      patches_commit: ${{ needs.fetch-commits.outputs.patches_commit }}
      susfs_commit: ${{ needs.fetch-commits.outputs.susfs_commit }}
      feature_set: ${{ inputs.feature_set || 'WKSU+SUSFS+BBG' }}
    secrets: inherit

  build-lts:
    if: ${{ inputs.kernel_build_version == 'all' || inputs.kernel_build_version == 'lts' || (github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/v')) || startsWith(github.ref, 'refs/tags/v') }}
    needs: fetch-commits
    uses: ./.github/workflows/prepare.yml
    with:
      config_file: .github/kernel-config/lts.json
      ksu_commit: ${{ inputs.ksu_commit || needs.fetch-commits.outputs.ksu_commit }}
      anykernel_commit: ${{ needs.fetch-commits.outputs.anykernel_commit }}
      patches_commit: ${{ needs.fetch-commits.outputs.patches_commit }}
      susfs_commit: ${{ needs.fetch-commits.outputs.susfs_commit }}
      feature_set: ${{ inputs.feature_set || 'WKSU+SUSFS+BBG' }}
    secrets: inherit

  build-custom:
    if: ${{ inputs.kernel_build_version == 'all' || inputs.kernel_build_version == 'custom' || startsWith(github.ref, 'refs/tags/v') }}
    needs: fetch-commits
    uses: ./.github/workflows/prepare.yml
    with:
      config_file: .github/kernel-config/custom.json
      ksu_commit: ${{ inputs.ksu_commit || needs.fetch-commits.outputs.ksu_commit }}
      anykernel_commit: ${{ needs.fetch-commits.outputs.anykernel_commit }}
      patches_commit: ${{ needs.fetch-commits.outputs.patches_commit }}
      susfs_commit: ${{ needs.fetch-commits.outputs.susfs_commit }}
      feature_set: ${{ inputs.feature_set || 'WKSU+SUSFS+BBG' }}
    secrets: inherit

  build-testing:
    if: ${{ inputs.kernel_build_version == 'all' || inputs.kernel_build_version == 'testing' || (github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/v')) || startsWith(github.ref, 'refs/tags/v') }}
    needs: fetch-commits
    uses: ./.github/workflows/prepare.yml
    with:
      config_file: .github/kernel-config/testing.json
      ksu_commit: ${{ inputs.ksu_commit || needs.fetch-commits.outputs.ksu_commit }}
      anykernel_commit: ${{ needs.fetch-commits.outputs.anykernel_commit }}
      patches_commit: ${{ needs.fetch-commits.outputs.patches_commit }}
      susfs_commit: ${{ needs.fetch-commits.outputs.susfs_commit }}
      feature_set: ${{ inputs.feature_set || 'WKSU+SUSFS+BBG' }}
    secrets: inherit

  build-bypass:
    if: ${{ inputs.kernel_build_version == 'all' || inputs.kernel_build_version == 'bypass' || startsWith(github.ref, 'refs/tags/v') }}
    needs: fetch-commits
    uses: ./.github/workflows/prepare.yml
    with:
      config_file: .github/kernel-config/bypass.json
      ksu_commit: ${{ inputs.ksu_commit || needs.fetch-commits.outputs.ksu_commit }}
      anykernel_commit: ${{ needs.fetch-commits.outputs.anykernel_commit }}
      patches_commit: ${{ needs.fetch-commits.outputs.patches_commit }}
      susfs_commit: ${{ needs.fetch-commits.outputs.susfs_commit }}
      feature_set: ${{ inputs.feature_set || 'WKSU+SUSFS+BBG' }}
    secrets: inherit

  rej:
    if: always()
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    needs:
    - build-a12-5-10
    - build-a13-5-10
    - build-a13-5-15
    - build-a14-5-15
    - build-a14-6-1
    - build-a15-6-6
    - build-a16-6-12
    - build-nezha-a16-6-12
    - build-custom
    - build-lts
    - build-testing
    - build-bypass
    steps:
    - name: Download Misc Artifacts
      uses: actions/download-artifact@v4
      with:
        path: ./downloaded-artifacts
        pattern: '*-Rejects'
        merge-multiple: false

    - name: Process Reject Artifacts
      run: |
        mkdir -p aio-rejects
        
        # Iterate over Rejects artifacts in downloaded-artifacts
        for dir in ./downloaded-artifacts/*-Rejects; do
            # Ensure it is a directory
            [ -d "$dir" ] || continue
            
            dirname=$(basename "$dir")
            # Process each reject artifact
            
            # Get original name (remove -Rejects suffix)
            original_name=${dirname%-Rejects}
            
            mkdir -p "aio-rejects/$original_name"
            
            # Check for patch-rejects folder (legacy structure) or direct contents
            if [ -d "$dir/patch-rejects" ]; then
              # Legacy structure
                cp -r "$dir/patch-rejects/." "aio-rejects/$original_name/"
            else
              # Current structure
                cp -r "$dir/." "aio-rejects/$original_name/"
            fi
        done
        
        # Zip and upload if we found anything
        if [ "$(ls -A aio-rejects)" ]; then
            # Create a single zip of all rejects
            cd aio-rejects
            zip -r -q -9 ../AIO-REJ.zip .
            cd ..
        else
            echo "No rejects found to upload."
        fi

    - name: Upload AIO-REJ Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AIO-REJ
        path: AIO-REJ.zip
        if-no-files-found: ignore

  release:
    runs-on: ubuntu-latest
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.release_type != 'Actions') || startsWith(github.ref, 'refs/tags/v') }}
    permissions:
      contents: write
    needs:
    - build-a12-5-10
    - build-a13-5-10
    - build-a13-5-15
    - build-a14-5-15
    - build-a14-6-1
    - build-a15-6-6
    - build-a16-6-12
    - build-nezha-a16-6-12
    - build-lts
    - build-custom
    - build-bypass
    - rej

    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_NAME: "GKI Kernels With WKSU & SUSFS v2.0.0"
      RELEASE_BODY: ""
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
    steps:
    - name: Validate Selected Builds
      run: |
        set -euo pipefail

        failed=0
        current_type="${{ inputs.kernel_build_version }}"
        if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
          current_type="all"
        fi

        check_selected() {
          local target="$1"
          local job_name="$2"
          local result="$3"
          
          if [[ "$current_type" == "all" || "$current_type" == "$target" ]]; then
            if [[ "$result" != "success" ]]; then
              echo "Required job $job_name did not succeed (result: $result)"
              failed=1
            fi
          fi
        }

        check_selected "a12-5-10" "build-a12-5-10" "${{ needs.build-a12-5-10.result }}"
        check_selected "a13-5-10" "build-a13-5-10" "${{ needs.build-a13-5-10.result }}"
        check_selected "a13-5-15" "build-a13-5-15" "${{ needs.build-a13-5-15.result }}"
        check_selected "a14-5-15" "build-a14-5-15" "${{ needs.build-a14-5-15.result }}"
        check_selected "a14-6-1" "build-a14-6-1" "${{ needs.build-a14-6-1.result }}"
        check_selected "a15-6-6" "build-a15-6-6" "${{ needs.build-a15-6-6.result }}"
        check_selected "a16-6-12" "build-a16-6-12" "${{ needs.build-a16-6-12.result }}"
        check_selected "custom" "build-custom" "${{ needs.build-custom.result }}"
        check_selected "lts" "build-lts" "${{ needs.build-lts.result }}"
        check_selected "bypass" "build-bypass" "${{ needs.build-bypass.result }}"

        if [[ "$failed" -ne 0 ]]; then
          exit 1
        fi

    - name: Free Disk Space
      if: true
      uses: endersonmenezes/free-disk-space@v3  # Use @main for latest, @v3 for stable
      with:
        remove_android: true
        remove_dotnet: true
        remove_haskell: true
        remove_tool_cache: true
        remove_swap: true
        remove_packages: "azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable firefox postgresql* temurin-* *llvm* mysql* dotnet-sdk-*"
        remove_packages_one_command: true
        remove_folders: "/usr/share/swift /usr/share/miniconda /usr/share/az* /usr/local/lib/node_modules /usr/local/share/chromium /usr/local/share/powershell /usr/local/julia /usr/local/aws-cli /usr/local/aws-sam-cli /usr/share/gradle"
        rm_cmd: "rmz"  # Use 'rmz' for faster deletion (default: 'rm')
        rmz_version: "3.1.1"  # Required when rm_cmd is 'rmz'
        testing: false

    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Ensure tag is from main
      if: ${{ startsWith(github.ref, 'refs/tags/v') }}
      run: |
        git fetch origin main
        git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"

    - name: Generate New Tag
      id: tag
      if: ${{ github.event_name == 'workflow_dispatch' && inputs.release_type != 'Actions' }}
      run: |
        LATEST_TAG=$(gh api repos/${{ github.repository }}/tags --jq '.[0].name' 2>/dev/null || echo "v0.0.0")
        if [[ -z "$LATEST_TAG" || "$LATEST_TAG" == "null" ]]; then
          LATEST_TAG="v0.0.0"
        fi
        
        if [[ "$LATEST_TAG" =~ ^(.*)-r([0-9]+)$ ]]; then
          VERSION="${BASH_REMATCH[1]}"
          REV="${BASH_REMATCH[2]}"
          NEW_REV=$((REV + 1))
          NEW_TAG="${VERSION}-r${NEW_REV}"
        else
          NEW_TAG="${LATEST_TAG}-r1"
        fi
        
        echo "Latest tag: $LATEST_TAG"
        echo "New tag: $NEW_TAG"
        echo "NEW_TAG=${NEW_TAG}" >> $GITHUB_ENV
        echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT

    - name: Set release body
      run: |
        cat << 'EOF' > release_body.md

        **IMPORTANT DISCLAIMER**
        This software is provided for testing and educational purposes only. Use at your own risk.
        The developers are not responsible for any damage, data loss, or issues that may occur.
        Please ensure you have proper backups before installation.

        Features:
        -> Wild KSU Manager Support, Also Compatible with KernelSU-Next Manager
        -> SUSFS ඞ v2.0.0
        -> SUSFS Inline Hooks
        -> IPSet Support for Advanced Network Filtering
        -> BBRv1 TCP Congestion Control
        -> BBG: https://github.com/vc-teahouse/Baseband-guard

        🔹 BBG (Baseband-guard)
        - A lightweight LSM (Linux Security Module) for Android kernel
        - Blocks unauthorized writes to critical partitions/device nodes
        - Prevents malicious tampering with baseband and boot chain
        - Kernel-level protection via LSM hooks
        - Reduces risk of soft-brick/hard-brick issues

        🔹 Bypass Builds
        - Includes module check bypass modifications 
        - What are kernel modules? Kernel modules are pieces of code that can be loaded into the kernel at runtime to extend functionality (like device drivers, filesystem support, etc.). These are different from KernelSU/Magisk modules. 
        - The Problem: Sometimes when installing a custom kernel, the device tries to load a kernel module that fails due to version mismatches, missing dependencies, or signature verification issues. This can cause boot failures or device instability. 
        - The Solution: These versions change one line from false to true to force load the kernel module, bypassing the failure check that would normally prevent loading.

        Kernel Flasher:
        -> https://github.com/fatalcoder524/KernelFlasher/

        Manager:
        -> Wild KSU Manager: https://github.com/WildKernels/Wild_KSU
        -> Next: https://github.com/KernelSU-Next/KernelSU-Next

        Module: 
        -> https://github.com/sidex15/ksu_module_susfs
        EOF

    - name: Resolve release tag
      id: release_tag
      run: |
        if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
          echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
        else
          echo "tag=${{ steps.tag.outputs.new_tag }}" >> "$GITHUB_OUTPUT"
        fi

    - name: Download AnyKernel3 Artifacts
      uses: actions/download-artifact@v4
      with:
        path: ./downloaded-artifacts
        pattern: '*-AnyKernel3'
        merge-multiple: false

    - name: Download AIO-REJ Artifact
      uses: actions/download-artifact@v4
      with:
        path: ./downloaded-artifacts
        pattern: 'AIO-REJ'
        merge-multiple: true

    - name: Package release zips
      run: |
        mkdir -p release-assets
        for dir in ./downloaded-artifacts/*-AnyKernel3; do
          [ -d "$dir" ] || continue
          name=$(basename "$dir")
          (cd "$dir" && zip -r -q -9 "../../release-assets/${name}.zip" .)
        done
        if [ -f "./downloaded-artifacts/AIO-REJ.zip" ]; then
          cp "./downloaded-artifacts/AIO-REJ.zip" "./release-assets/AIO-REJ.zip"
        fi

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.release_tag.outputs.tag }}
        name: ${{ steps.release_tag.outputs.tag }}
        body_path: release_body.md
        draft: false
        prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.release_type == 'Pre-Release' }}
        files: release-assets/*.zip
