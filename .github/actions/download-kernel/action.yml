name: 'Download Kernel Repository'
description: 'Initialize and sync Android kernel source repository'

inputs:
  android_version:
    description: 'Android version (e.g., android14)'
    required: true
  kernel_version:
    description: 'Kernel version (e.g., 5.15, 6.1)'
    required: true
  os_patch_level:
    description: 'OS patch level (e.g., 2024-01)'
    required: true

outputs:
  deprecated_branch:
    description: 'Whether the branch is deprecated'
    value: ${{ steps.sync.outputs.deprecated }}

runs:
  using: composite
  steps:
    - name: Initialize and Sync Kernel Repository
      id: sync
      shell: bash
      working-directory: ${{ github.workspace }}/kernel
      run: |
        FORMATTED_BRANCH="${{ inputs.android_version }}-${{ inputs.kernel_version }}-${{ inputs.os_patch_level }}"

        # Initialize repo with the target branch
        repo init -u https://android.googlesource.com/kernel/manifest -b common-${FORMATTED_BRANCH} --depth=1

        # Check if branch is deprecated
        REMOTE_BRANCH=$(git ls-remote https://android.googlesource.com/kernel/common ${FORMATTED_BRANCH})
        DEFAULT_MANIFEST_PATH=.repo/manifests/default.xml
        DEPRECATED=false
        
        if grep -q deprecated <<< $REMOTE_BRANCH; then
          sed -i "s/\"${FORMATTED_BRANCH}\"/\"deprecated\/${FORMATTED_BRANCH}\"/g" $DEFAULT_MANIFEST_PATH
          echo "⚠ Note: Branch ${FORMATTED_BRANCH} is considered deprecated."
          DEPRECATED=true
        fi
        
        echo "deprecated=$DEPRECATED" >> $GITHUB_OUTPUT
        
        # Sync only the minimal project set required by android16-6.12 Kleaf builds.
        # This keeps CI runtime down and avoids pulling unrelated repos.
        PROJECTS=(
          build/kernel
          common
          common-modules/trusty
          common-modules/virtual-device
          common-modules/virtio-media
          external/bazel-contrib-bazel_features
          external/bazel-skylib
          external/bazelbuild-bazel-central-registry
          external/bazelbuild-platforms
          external/bazelbuild-rules_cc
          external/bazelbuild-rules_license
          external/bazelbuild-rules_pkg
          external/bazelbuild-rules_python
          external/bazelbuild-rules_rust
          external/bazelbuild-rules_shell
          external/libcap
          external/libcap-ng
          external/lz4
          external/pigz
          external/python/absl-py
          external/toybox
          external/zlib
          external/zopfli
          prebuilts/build-tools
          prebuilts/clang-tools
          prebuilts/clang/host/linux-x86
          prebuilts/gcc/linux-x86/host/x86_64-linux-glibc2.17-4.8
          prebuilts/jdk/jdk11
          prebuilts/kernel-build-tools
          prebuilts/ndk-r26
          prebuilts/rust
          tools/mkbootimg
        )

        # Sync kernel source
        repo --trace sync \
          -c \
          -j"$(nproc --all)" \
          --fail-fast \
          --force-sync \
          --no-clone-bundle \
          --no-tags \
          --optimized-fetch \
          "${PROJECTS[@]}"
